version: "3"

tasks:
  do:
    desc: "Fast development loop"
    aliases: ["d"]
    cmds:
      - task: format
      - task: lint

  dev:
    desc: "Start Mintlify dev server"
    cmds:
      - pnpm dev

  build:
    desc: "Build documentation"
    cmds:
      - pnpm build

  screenshots:
    desc: "Capture and embed screenshots from screenshot suggestions"
    cmds:
      - pnpm screenshots

  screenshots:dry:
    desc: "List screenshot suggestions without writing files"
    cmds:
      - pnpm screenshots:dry

  format:
    desc: "Format MDX files"
    cmds:
      - echo "Format task - add prettier when needed"

  check:
    desc: "Run all checks"
    cmds:
      - task: check:links

  check:links:
    desc: "Check for broken links"
    cmds:
      - pnpm exec mint broken-links

  lint:
    desc: "Lint documentation"
    cmds:
      - echo "Lint task - add vale or textlint when needed"

  install:
    desc: "Install dependencies"
    cmds:
      - pnpm install
