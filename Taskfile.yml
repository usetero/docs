version: "3"

tasks:
  do:
    desc: "Fast development loop"
    aliases: ["d"]
    cmds:
      - task: format
      - task: lint

  dev:
    desc: "Start Mintlify dev server"
    cmds:
      - pnpm dev

  build:
    desc: "Build documentation"
    cmds:
      - pnpm build

  screenshots:
    desc: "Capture and embed screenshots from screenshot suggestions"
    cmds:
      - pnpm screenshots

  screenshots:dry:
    desc: "List screenshot suggestions without writing files"
    cmds:
      - pnpm screenshots:dry

  format:
    desc: "Format MDX files"
    cmds:
      - echo "Format task - add prettier when needed"

  check:
    desc: "Run all checks"
    cmds:
      - task: check:links

  check:links:
    desc: "Check for broken links (ignores .agents)"
    cmds:
      # mint broken-links has no exclude option, so strip .agents/ entries
      # from its report and fail only if other files have broken links
      - |
        out=$(pnpm exec mint broken-links 2>&1 || true)
        filtered=$(printf '%s\n' "$out" | awk '/^\.agents\//{skip=1;next} /^[^[:space:]]/{skip=0} !skip')
        if printf '%s\n' "$filtered" | grep -qE '^[^[:space:]].*\.(md|mdx)$'; then
          printf '%s\n' "$filtered"
          exit 1
        fi
        echo "No broken links found (excluding .agents)"

  lint:
    desc: "Lint documentation"
    cmds:
      - echo "Lint task - add vale or textlint when needed"

  install:
    desc: "Install dependencies"
    cmds:
      - pnpm install
